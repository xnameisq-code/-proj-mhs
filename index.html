<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHS Personnel Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chiron+Sung+HK:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --bg-color: #050507;
            --text-color: #e0e0e0;
            --accent-red: #ff2a2a;
            --accent-purple: #8a2be2;
            --accent-cyan: #00f2ff; /* 시스템 섹터용 포인트 컬러 */
            --line-color: #333;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Chiron Sung HK', serif;
            overflow-x: hidden;
        }

        header {
            padding: 40px 20px 20px; text-align: center; position: relative;
            border-bottom: 1px solid var(--line-color);
            background: linear-gradient(180deg, #111 0%, transparent 100%);
        }

        header h1 {
            margin: 0; font-size: 32px; font-weight: 700; letter-spacing: 6px;
            text-shadow: 0 0 15px rgba(255, 42, 42, 0.4); color: #fff;
        }

        .master-login-btn {
            position: absolute; top: 20px; right: 20px;
            background: transparent; border: 1px solid var(--line-color);
            color: #666; cursor: pointer; padding: 5px 10px; font-size: 11px;
            border-radius: 4px; transition: 0.3s;
        }
        .master-login-btn:hover { border-color: var(--accent-red); color: var(--accent-red); }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        .sector { margin-bottom: 60px; }
        .sector-header { display: flex; align-items: center; margin-bottom: 30px; }
        .sector-header h2 { margin: 0; font-size: 22px; color: #fff; letter-spacing: 4px; padding-right: 20px; }
        
        /* 섹터별 개성있는 포인트 */
        #sector-system h2 { text-shadow: 0 0 10px rgba(0, 242, 255, 0.6); }
        #sector-underworld h2 { text-shadow: 0 0 10px rgba(138, 43, 226, 0.6); }
        #sector-special h2 { text-shadow: 0 0 10px rgba(255, 42, 42, 0.6); }
        #sector-secret h2 { text-shadow: 0 0 10px rgba(200, 200, 200, 0.4); }

        .sector-line { flex-grow: 1; height: 1px; background: linear-gradient(90deg, var(--line-color) 0%, transparent 100%); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; }

        .agent-card {
            background: #0f0f13; border: 1px solid #1f1f25; border-radius: 6px; overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s; position: relative;
        }
        .agent-card:hover { transform: translateY(-5px); border-color: var(--accent-red); box-shadow: 0 10px 20px rgba(255, 42, 42, 0.15); }

        .card-photo { width: 100%; height: 220px; background-color: #000; position: relative; overflow: hidden; }
        .card-photo img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(30%); transition: 0.3s; }
        .agent-card:hover .card-photo img { filter: grayscale(0%); }

        .card-info { padding: 15px; text-align: center; }
        .card-position { font-size: 11px; color: var(--accent-red); font-weight: 700; margin-bottom: 4px; letter-spacing: 1px; }
        .card-name { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 5px; letter-spacing: 2px; }
        .card-gender { font-size: 11px; color: #666; }

        /* 마스터 전용 UI */
        .master-only { display: none; }
        body.master-mode .master-only { display: flex; }
        body.master-mode .master-login-btn { background: var(--accent-red); color: #fff; border-color: var(--accent-red); text-shadow: none; }

        .add-card-btn {
            background: rgba(255, 255, 255, 0.02); border: 1px dashed #444; border-radius: 6px;
            display: flex; justify-content: center; align-items: center; height: 290px;
            cursor: pointer; color: #666; font-size: 40px; transition: 0.3s;
        }
        .add-card-btn:hover { background: rgba(255, 42, 42, 0.05); border-color: var(--accent-red); color: var(--accent-red); }
    </style>
</head>
<body>

    <header>
        <h1>멸혼사 인사 관리 시스템</h1>
        <button class="master-login-btn" onclick="toggleMasterMode()">⚙️ Master</button>
    </header>

    <div class="container">
        <div class="sector" id="sector-system">
            <div class="sector-header"><h2>시스템</h2><div class="sector-line"></div></div>
            <div class="grid" id="grid-system"></div>
        </div>

        <div class="sector" id="sector-underworld">
            <div class="sector-header"><h2>저승</h2><div class="sector-line"></div></div>
            <div class="grid" id="grid-underworld"></div>
        </div>

        <div class="sector" id="sector-special">
            <div class="sector-header"><h2>특대과</h2><div class="sector-line"></div></div>
            <div class="grid" id="grid-special"></div>
        </div>

        <div class="sector" id="sector-secret">
            <div class="sector-header"><h2>비문</h2><div class="sector-line"></div></div>
            <div class="grid" id="grid-secret"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB3BYyOVfRSpugWp5hLZeQMikzEAZG4KWc",
            authDomain: "proj-mhs.firebaseapp.com",
            projectId: "proj-mhs",
            storageBucket: "proj-mhs.firebasestorage.app",
            messagingSenderId: "280336894573",
            appId: "1:280336894573:web:fa896b9d61d5d393660d64",
            measurementId: "G-H8P1DHJ223"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let isMaster = false;

        function toggleMasterMode() {
            if (!isMaster) {
                const pwd = prompt("마스터 권한 암호를 입력하세요.");
                if (pwd === "mhs123") {
                    isMaster = true;
                    document.body.classList.add('master-mode');
                    document.querySelector('.master-login-btn').innerText = "🔓 Master ON";
                    alert("마스터 모드 활성화 완료.");
                } else if (pwd !== null) {
                    alert("암호가 일치하지 않습니다.");
                }
            } else {
                isMaster = false;
                document.body.classList.remove('master-mode');
                document.querySelector('.master-login-btn').innerText = "⚙️ Master";
            }
        }

        // [+] 버튼 클릭 시 데이터 추가
        function addAgentPrompt(gridId) {
            const sectorName = gridId.replace('grid-', '');
            
            const name = prompt("요원의 이름을 입력하세요:");
            if (!name) return;
            
            // 직책 입력칸 추가
            const position = prompt("요원의 직책을 입력하세요 (예: 팀장, 대원, 관리자 등):", "대원");
            const gender = prompt("성별을 입력하세요:", "미상");
            const photoUrl = prompt("사진 URL을 입력하세요 (빈칸 시 기본 이미지):", "");

            const defaultPhoto = "https://via.placeholder.com/200x250/111/555?text=No+Image";
            
            db.collection("agents").add({
                sector: sectorName,
                name: name,
                position: position ? position : "대원", // 데이터베이스에 직책 저장
                gender: gender,
                photo: photoUrl ? photoUrl : defaultPhoto,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                alert(`'${name}' 요원이 등록되었습니다.`);
            })
            .catch((error) => {
                alert("등록 중 오류가 발생했습니다.");
            });
        }

        // 실시간 데이터 불러오기
        db.collection("agents").orderBy("createdAt", "asc").onSnapshot((querySnapshot) => {
            document.getElementById('grid-system').innerHTML = '';
            document.getElementById('grid-underworld').innerHTML = '';
            document.getElementById('grid-special').innerHTML = '';
            document.getElementById('grid-secret').innerHTML = '';

            querySnapshot.forEach((doc) => {
                const agent = doc.data();
                const cardHTML = `
                    <div class="agent-card">
                        <div class="card-photo">
                            <img src="${agent.photo}" alt="${agent.name}">
                        </div>
                        <div class="card-info">
                            <div class="card-position">${agent.position ? agent.position : '대원'}</div>
                            <div class="card-name">${agent.name}</div>
                            <div class="card-gender">${agent.gender}</div>
                        </div>
                    </div>
                `;
                const gridElement = document.getElementById(`grid-${agent.sector}`);
                if(gridElement) {
                    gridElement.insertAdjacentHTML('beforeend', cardHTML);
                }
            });

            // 마스터용 [+] 버튼 재배치
            const addBtnHTML = `<div class="add-card-btn master-only" onclick="addAgentPrompt(this.parentElement.id)">+</div>`;
            document.getElementById('grid-system').insertAdjacentHTML('beforeend', addBtnHTML);
            document.getElementById('grid-underworld').insertAdjacentHTML('beforeend', addBtnHTML);
            document.getElementById('grid-special').insertAdjacentHTML('beforeend', addBtnHTML);
            document.getElementById('grid-secret').insertAdjacentHTML('beforeend', addBtnHTML);
        });
    </script>
</body>
</html>
